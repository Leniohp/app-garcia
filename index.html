<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Garcia Agro — Monitoramento RJ</title>
<meta name="theme-color" content="#1D6E3C">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Garcia Agro">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --verde:#1D6E3C; --verde2:#2E8B4F; --folha:#8DC63F;
    --bg:#f4f6f0; --card:#ffffff; --linha:#d8e0d2;
    --txt:#173404; --txt2:#5F6B5A; --txt3:#8a9382;
    --chip:#EAF3DE; --chip-ic:#3B6D11;
    --erro-bg:#fbeaea; --erro:#a32d2d; --ok-bg:#e7f3df; --ok:#3b6d11;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--txt); overflow-x:hidden;}

  /* ===== LOGIN ===== */
  #login{min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding:0 24px; background:#E7E1DC;}
  .login-img{width:248px; max-width:72vw; margin-top:calc(env(safe-area-inset-top) + 56px); border-radius:14px;}
  .login-sub{font-size:12.5px; color:#5b6356; text-align:center; margin:18px 0 26px; line-height:1.5;}
  .login-card{width:100%; max-width:340px;}
  .tabs{display:flex; gap:8px; margin-bottom:16px;}
  .tabs button{flex:1; padding:11px; border:1px solid #cdd4c3; border-radius:11px; background:transparent; font-size:13px; font-weight:600; color:#6b7563; cursor:pointer; font-family:inherit;}
  .tabs button.active{background:var(--verde); color:#fff; border-color:var(--verde);}
  #login input{width:100%; padding:13px 14px; border:1px solid #d3dac9; border-radius:11px; font-size:14px; margin-bottom:11px; background:#fbfaf7; color:#173404; font-family:inherit;}
  #login input::placeholder{color:#9aa392;}
  #login input:focus{outline:none; border-color:var(--verde2); box-shadow:0 0 0 3px rgba(46,139,79,.12);}
  #login input:-webkit-autofill,
  #login input:-webkit-autofill:hover,
  #login input:-webkit-autofill:focus{
    -webkit-text-fill-color:#173404 !important;
    -webkit-box-shadow:0 0 0 1000px #fbfaf7 inset !important;
    box-shadow:0 0 0 1000px #fbfaf7 inset !important;
    caret-color:#173404;
    transition:background-color 9999s ease-in-out 0s;
  }
  .btn-entrar{width:100%; padding:14px; border:0; border-radius:11px; background:var(--verde); color:#fff; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:4px;}
  .btn-entrar:disabled{opacity:.6; cursor:default;}
  .aviso{font-size:12.5px; margin-top:13px; padding:10px 12px; border-radius:9px; display:none; line-height:1.4;}
  .aviso.err{background:#fbeaea; color:#a32d2d; display:block;}
  .aviso.ok{background:#e7f3df; color:#3b6d11; display:block;}
  .login-rod{font-size:10px; color:#9aa392; margin-top:34px; margin-bottom:24px; text-align:center; display:flex; align-items:center; gap:6px;}
  .login-rod svg{width:12px; height:12px; stroke:#6E9A36;}

  /* ===== APP ===== */
  #app{display:none;}
  .topo{background:var(--verde); padding:calc(env(safe-area-inset-top) + 18px) 18px 20px; color:#fff;}
  .topo-row{display:flex; align-items:center; gap:11px; max-width:560px; margin:0 auto;}
  .logo{width:42px; height:42px; border-radius:11px; background:var(--verde2); display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0;}
  .logo b{font-size:24px; font-weight:700; color:#fff;}
  .logo .lf{position:absolute; right:5px; bottom:6px; width:11px; height:16px; background:var(--folha); border-radius:0 80% 0 80%; transform:rotate(35deg);}
  .topo h1{font-size:16px; font-weight:600; line-height:1.2;}
  .topo .s{font-size:11px; color:#B7DCC2; line-height:1.3;}
  .topo .sair{margin-left:auto; background:rgba(255,255,255,.15); border:0; color:#fff; font-size:12px; padding:7px 12px; border-radius:8px; cursor:pointer; font-family:inherit;}

  .saudacao{max-width:560px; margin:18px auto 6px; padding:0 18px;}
  .saudacao h2{font-size:17px; font-weight:600; color:var(--txt);}
  .saudacao p{font-size:12px; color:var(--txt2); margin-top:2px;}

  .grade{max-width:560px; margin:0 auto; padding:10px 14px 24px; display:grid; grid-template-columns:repeat(2,1fr); gap:13px;}
  .mod{background:var(--card); border:0.5px solid var(--linha); border-radius:16px; padding:16px 13px; display:flex; flex-direction:column; gap:9px; min-height:128px; cursor:pointer; transition:transform .12s; text-align:left; font-family:inherit; color:inherit;}
  .mod:active{transform:scale(.97);}
  .mod .ic{width:42px; height:42px; border-radius:12px; background:var(--chip); display:flex; align-items:center; justify-content:center;}
  .mod .ic svg{width:23px; height:23px; stroke:var(--chip-ic);}
  .mod .nm{font-size:13.5px; font-weight:600; line-height:1.25;}
  .mod .ds{font-size:11px; color:var(--txt2); line-height:1.3;}
  .mod .tag{font-size:9.5px; color:var(--txt3); margin-top:auto;}
  .mod.pronto .tag{color:var(--chip-ic);}

  .rodape{max-width:560px; margin:0 auto; padding:4px 18px calc(env(safe-area-inset-bottom) + 22px);}
  .rodape .l{border-top:0.5px solid var(--linha); padding-top:12px; display:flex; align-items:center; justify-content:center; gap:6px; font-size:10px; color:var(--txt3);}

  /* ===== VISOR ===== */
  .visor{position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .26s ease; z-index:50;}
  .visor.aberto{transform:translateX(0);}
  .visor-topo{background:var(--verde); color:#fff; display:flex; align-items:center; gap:6px; padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;}
  .voltar{background:transparent; border:0; color:#fff; font-size:15px; font-weight:500; display:flex; align-items:center; gap:4px; cursor:pointer; padding:6px 4px; font-family:inherit;}
  .voltar svg{width:20px; height:20px; stroke:#fff;}
  .visor-titulo{font-size:15px; font-weight:600;}
  .visor-acao{margin-left:auto;}
  .visor-acao a{color:#B7DCC2; font-size:12px; text-decoration:none; display:inline-flex; align-items:center; gap:4px;}
  .visor-acao svg{width:14px; height:14px; stroke:currentColor;}
  .visor iframe{flex:1; border:0; width:100%; background:#0f1115;}
  .obra{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; gap:14px;}
  .obra .big{width:64px; height:64px; border-radius:18px; background:var(--chip); display:flex; align-items:center; justify-content:center;}
  .obra .big svg{width:32px; height:32px; stroke:var(--chip-ic);}
  .obra h3{font-size:17px; font-weight:600; color:var(--txt);}
  .obra p{font-size:13px; color:var(--txt2); max-width:280px; line-height:1.5;}

  .carregando{min-height:100dvh; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--txt2);}

  .admin-ico{margin-left:auto; background:rgba(255,255,255,.15); border:0; color:#fff; width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .admin-ico svg{width:19px; height:19px; stroke:#fff;}
  .admin-ico + .sair{margin-left:8px;}

  .modal{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:60; padding:18px;}
  .modal.on{display:flex;}
  .modal-card{background:var(--card); border:0.5px solid var(--linha); border-radius:16px; width:min(440px,96vw); max-height:86vh; overflow:auto;}
  .modal-card h3{font-size:16px; font-weight:600; color:var(--txt); padding:18px 20px; border-bottom:0.5px solid var(--linha); display:flex; align-items:center; justify-content:space-between;}
  .modal-card h3 .x{cursor:pointer; color:var(--txt2); font-size:22px; line-height:1; background:none; border:0;}
  .modal-body{padding:16px 20px;}
  .ucard{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px; border:0.5px solid var(--linha); border-radius:11px; margin-bottom:10px;}
  .ucard .em{font-size:13px; font-weight:500; color:var(--txt); word-break:break-all;}
  .ucard .st{font-size:11px; padding:2px 9px; border-radius:20px; display:inline-block; margin-top:4px;}
  .st.pend{background:#FAEEDA; color:#854F0B;}
  .st.apr{background:#e7f3df; color:#3b6d11;}
  .st.rej{background:#fbeaea; color:#a32d2d;}
  .ucard .acoes{display:flex; gap:7px; flex-shrink:0;}
  .ucard button{font-size:12px; padding:7px 12px; border-radius:8px; border:0.5px solid var(--linha); background:transparent; cursor:pointer; font-family:inherit; color:var(--txt);}
  .ucard button.apr{border-color:#3b6d11; color:#3b6d11;}
  .ucard button.rej{border-color:#a32d2d; color:#a32d2d;}
  .modal-vazio{text-align:center; color:var(--txt2); font-size:13px; padding:30px;}

  @media(prefers-color-scheme:dark){
    :root{--bg:#11160f; --card:#1b2118; --linha:#2c3526; --txt:#e9f0e3; --txt2:#a6b29c; --txt3:#7a8670; --chip:#243019; --chip-ic:#97C459; --erro-bg:#2e1a1a; --erro:#f0a0a0; --ok-bg:#1c2914; --ok:#9fd96a;}
    .st.pend{background:#3a2f1f; color:#FAC775;}
    .st.apr{background:#1c2914; color:#9fd96a;}
    .st.rej{background:#2e1a1a; color:#f0a0a0;}
  }
</style>
</head>
<body>

<!-- ===== CARREGANDO (enquanto checa sessão) ===== -->
<div id="splash" class="carregando">Carregando…</div>

<!-- ===== LOGIN ===== -->
<div id="login" style="display:none">
  <img class="login-img" id="loginLogo" alt="Garcia Agro">
  <div class="login-sub">Monitoramento da Recuperação Judicial<br>acesso restrito</div>
  <div class="login-card">
    <div class="tabs">
      <button id="tabEntrar" class="active" onclick="aba('login')">Entrar</button>
      <button id="tabCriar" onclick="aba('signup')">Criar conta</button>
    </div>
    <input id="email" type="email" placeholder="Seu email" autocomplete="email">
    <input id="senha" type="password" placeholder="Senha" autocomplete="current-password">
    <button class="btn-entrar" id="btnAuth" onclick="autenticar()">Entrar</button>
    <div class="aviso" id="aviso"></div>
  </div>
  <div class="login-rod">
    <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 3l7 4v5c0 4-3 7-7 9-4-2-7-5-7-9V7z"/><path d="M9 12l2 2 4-4"/></svg>
    Processo nº 1013776-24.2024.8.11.0003
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topo">
    <div class="topo-row">
      <div class="logo"><b>G</b><span class="lf"></span></div>
      <div>
        <h1>Garcia Agro</h1>
        <div class="s">Recuperação Judicial · Monitoramento</div>
      </div>
      <button class="admin-ico" id="adminIco" onclick="abrirAdmin()" title="Gerenciar acesso" aria-label="Gerenciar acesso" style="display:none">
        <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </button>
      <button class="sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="saudacao">
    <h2>Bem-vindo, Agente Judicial</h2>
    <p>Selecione um módulo para começar.</p>
  </div>

  <div class="grade">
    <button class="mod pronto" onclick="abrirIframe('Extratos bancários','https://leniohp.github.io/extratos-garcia/?app=1')">
      <div class="ic"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg></div>
      <div class="nm">Extratos bancários</div>
      <div class="ds">Movimentações das contas</div>
      <div class="tag">● Disponível</div>
    </button>

    <button class="mod pronto" onclick="abrirIframe('Pagamentos','https://leniohp.github.io/pagamentos-garcia/?app=1')">
      <div class="ic"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18M7 15h2"/></svg></div>
      <div class="nm">Pagamentos</div>
      <div class="ds">Controle de pagamentos</div>
      <div class="tag">● Disponível</div>
    </button>

    <button class="mod pronto" onclick="abrirIframe('Contratos','https://leniohp.github.io/contratos-garcia/?app=1')">
      <div class="ic"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><path d="M9 12h6M9 16h6"/></svg></div>
      <div class="nm">Contratos</div>
      <div class="ds">Documentos do grupo</div>
      <div class="tag">● Disponível</div>
    </button>

    <button class="mod pronto" onclick="abrirIframe('Solicitações RMA','https://leniohp.github.io/rma-garcia/?app=1')">
      <div class="ic"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg></div>
      <div class="nm">Solicitações RMA</div>
      <div class="ds">Documentos mensais (RMA)</div>
      <div class="tag">● Disponível</div>
    </button>
  </div>

  <div class="rodape">
    <div class="l">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 3l7 4v5c0 4-3 7-7 9-4-2-7-5-7-9V7z"/><path d="M9 12l2 2 4-4"/></svg>
      Processo nº 1013776-24.2024.8.11.0003
    </div>
  </div>
</div>

<!-- ===== MODAL ADMIN (gerenciar acesso) ===== -->
<div class="modal" id="adminModal">
  <div class="modal-card">
    <h3>Gerenciar acesso <button class="x" onclick="fecharAdmin()" aria-label="Fechar">&times;</button></h3>
    <div class="modal-body" id="adminBody"><div class="modal-vazio">Carregando…</div></div>
  </div>
</div>

<!-- ===== VISOR ===== -->
<div class="visor" id="visor">
  <div class="visor-topo">
    <button class="voltar" onclick="fechar()">
      <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Voltar
    </button>
    <span class="visor-titulo" id="vtitulo"></span>
    <span class="visor-acao" id="vacao"></span>
  </div>
  <div id="vcorpo" style="flex:1; display:flex; flex-direction:column;"></div>
</div>

const SUPABASE_URL = "https://rgvqzxbprnxffjkgmman.supabase.co";
const SUPABASE_KEY = "sb_publishable_YzL3o_4epetSEsJxgIYRgQ_qsw8piEB";
const ADMIN_EMAIL  = "adm@maximagestao.com";
let sb = null;
try{
  if(typeof supabase === "undefined") throw new Error("lib não carregou");
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}catch(e){
  sb = null;
}

const splash = document.getElementById('splash');
const telaLogin = document.getElementById('login');
const telaApp = document.getElementById('app');
const aviso = document.getElementById('aviso');
const btnAuth = document.getElementById('btnAuth');

let modo = "login";
function aba(m){
  modo = m;
  tabEntrar.classList.toggle("active", m==="login");
  tabCriar.classList.toggle("active", m==="signup");
  btnAuth.textContent = m==="login" ? "Entrar" : "Criar conta";
  aviso.className = "aviso";
}
function mostrarAviso(txt, tipo){ aviso.textContent = txt; aviso.className = "aviso " + tipo; }

function traduz(m){
  if(/Invalid login/i.test(m)) return "Email ou senha incorretos.";
  if(/already registered/i.test(m)) return "Este email já tem conta. Use 'Entrar'.";
  if(/at least 6/i.test(m)) return "A senha precisa ter ao menos 6 caracteres.";
  return m;
}

async function autenticar(){
  if(!sb){ mostrarAviso("Sem conexão com o servidor. Verifique sua internet e recarregue.","err"); return; }
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  if(!email || !senha){ mostrarAviso("Preencha email e senha.","err"); return; }
  btnAuth.disabled = true;
  try{
    if(modo === "signup"){
      const {error} = await sb.auth.signUp({email, password:senha});
      if(error) throw error;
      mostrarAviso("Conta criada! Aguarde a aprovação do administrador para acessar.","ok");
    }else{
      const {error} = await sb.auth.signInWithPassword({email, password:senha});
      if(error) throw error;
      await checarSessao();
    }
  }catch(e){ mostrarAviso(traduz(e.message),"err"); }
  btnAuth.disabled = false;
}

async function sair(){ await sb.auth.signOut(); location.reload(); }

async function checarSessao(){
  if(!sb){ verLogin(); return; }
  // segurança: se em 8s nada responder, mostra o login em vez de travar
  let resolvido = false;
  const guarda = setTimeout(()=>{ if(!resolvido) verLogin(); }, 8000);
  try{
    const {data:{session}} = await sb.auth.getSession();
    if(!session){ resolvido=true; clearTimeout(guarda); verLogin(); return; }
    const user = session.user;
    const isAdmin = user.email === ADMIN_EMAIL;
    window.__isAdmin = isAdmin;
    const {data:perfil} = await sb.from("perfis").select("status").eq("id",user.id).maybeSingle();
    const status = perfil ? perfil.status : "pendente";
    resolvido=true; clearTimeout(guarda);
    if(!isAdmin && status !== "aprovado"){
      await sb.auth.signOut();
      verLogin();
      mostrarAviso(status==="recusado" ? "Seu acesso foi recusado pelo administrador." : "Sua conta está aguardando aprovação do administrador.","ok");
      return;
    }
    verApp();
  }catch(e){
    resolvido=true; clearTimeout(guarda);
    verLogin();
  }
}

function verLogin(){ splash.style.display="none"; telaApp.style.display="none"; telaLogin.style.display="flex"; }
function verApp(){
  splash.style.display="none"; telaLogin.style.display="none"; telaApp.style.display="block";
  if(window.__isAdmin) document.getElementById("adminIco").style.display="flex";
}

/* ===== ADMIN: gerenciar acesso ===== */
const adminModal = document.getElementById("adminModal");
const adminBody = document.getElementById("adminBody");

async function abrirAdmin(){
  adminModal.classList.add("on");
  adminBody.innerHTML = '<div class="modal-vazio">Carregando…</div>';
  try{
    const {data,error} = await sb.from("perfis").select("*").order("created_at",{ascending:false});
    if(error) throw error;
    if(!data || !data.length){ adminBody.innerHTML = '<div class="modal-vazio">Nenhum usuário cadastrado ainda.</div>'; return; }
    adminBody.innerHTML = data.map(u=>{
      const cls = u.status==="aprovado" ? "apr" : u.status==="recusado" ? "rej" : "pend";
      const txt = u.status==="aprovado" ? "Aprovado" : u.status==="recusado" ? "Recusado" : "Pendente";
      return '<div class="ucard"><div><div class="em">'+(u.email||u.id)+'</div><span class="st '+cls+'">'+txt+'</span></div>'
        + '<div class="acoes"><button class="apr" onclick="defStatus(\''+u.id+'\',\'aprovado\')">Aprovar</button>'
        + '<button class="rej" onclick="defStatus(\''+u.id+'\',\'recusado\')">Recusar</button></div></div>';
    }).join("");
  }catch(e){
    adminBody.innerHTML = '<div class="modal-vazio">Erro ao carregar: '+e.message+'</div>';
  }
}
function fecharAdmin(){ adminModal.classList.remove("on"); }
async function defStatus(id, status){
  try{
    const {error} = await sb.from("perfis").update({status}).eq("id",id);
    if(error) throw error;
    abrirAdmin();
  }catch(e){ alert("Erro: "+e.message); }
}

/* ===== VISOR (módulos) ===== */
const visor = document.getElementById('visor');
const vtitulo = document.getElementById('vtitulo');
const vcorpo = document.getElementById('vcorpo');
const vacao = document.getElementById('vacao');

function abrirIframe(titulo, url){
  const sep = url.indexOf('?') === -1 ? '?' : '&';
  const urlv = url + sep + 'v=' + Date.now();
  vtitulo.textContent = titulo;
  vacao.innerHTML = '<a href="'+urlv+'" target="_blank" rel="noopener">Tela cheia <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15 3h6v6M10 14L21 3M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></a>';
  vcorpo.innerHTML = '<iframe src="'+urlv+'" allow="clipboard-read; clipboard-write"></iframe>';
  visor.classList.add('aberto');
  history.pushState({visor:true}, '');
}
function abrirObra(titulo){
  vtitulo.textContent = titulo;
  vacao.innerHTML = '';
  vcorpo.innerHTML = '<div class="obra">'
    + '<div class="big"><svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg></div>'
    + '<h3>Em construção</h3>'
    + '<p>O conteúdo do módulo <b>'+titulo+'</b> ainda será definido. Em breve estará disponível aqui dentro do app.</p>'
    + '</div>';
  visor.classList.add('aberto');
  history.pushState({visor:true}, '');
}
function fechar(){ visor.classList.remove('aberto'); setTimeout(()=>{ vcorpo.innerHTML=''; }, 280); }
window.addEventListener('popstate', ()=>{ if(visor.classList.contains('aberto')) fechar(); });

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

checarSessao();
</script>
